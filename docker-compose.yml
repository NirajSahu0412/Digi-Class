# Docker Compose for LiveKit Local Development
services:
  livekit:
    image: livekit/livekit-server:v1.10
    container_name: livekit-server
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880" # HTTP API and signaling
      - "7881:7881" # WebRTC signaling
      - "7882:7882/udp" # WebRTC ice
      - "50000-50050:50000-50050/udp" # WebRTC media
    restart: unless-stopped
